<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>DASHLANDER</title>
<style>
  :root{
    --magenta:#43ff84;
    --cyan:#9bffc0;
    --amber:#b9ff3d;
    --bg:#000600;
    --ok:#5cff7a;
    --bad:#eaffc2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    font-family:ui-monospace,"DejaVu Sans Mono","Courier New",monospace;color:#fff;
    -webkit-user-select:none;user-select:none;touch-action:none;}
  #wrap{position:fixed;inset:0;}
  canvas{display:block;position:absolute;inset:0;}

  /* ---------- HUD ---------- */
  #hud{position:absolute;top:14px;left:14px;right:14px;display:flex;
    justify-content:space-between;pointer-events:none;font-variant-numeric:tabular-nums;}
  .panel{background:rgba(8,6,20,.55);border:1px solid rgba(67,255,132,.35);
    border-radius:10px;padding:10px 14px;backdrop-filter:blur(3px);
    box-shadow:0 0 18px rgba(67,255,132,.15) inset, 0 0 12px rgba(155,255,192,.08);}
  .stat{display:flex;justify-content:space-between;gap:18px;font-size:13px;
    letter-spacing:.5px;line-height:1.7;}
  .stat .lbl{color:#9fb6c9;}
  .stat .val{color:var(--cyan);font-weight:600;}
  .val.ok{color:var(--ok);} .val.bad{color:var(--bad);}
  #fuelbar{height:7px;width:150px;background:rgba(255,255,255,.1);border-radius:4px;
    margin-top:6px;overflow:hidden;}
  #fuelfill{height:100%;width:100%;
    background:linear-gradient(90deg,var(--magenta),var(--cyan));transition:width .08s linear;}
  #right-panel{text-align:right;}
  #target-dist{color:var(--amber);font-weight:600;}

  /* ---------- overlay screens ---------- */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(ellipse at 50% 40%,rgba(40,0,60,.55),rgba(2,1,8,.92));
    z-index:20;padding:24px;}
  .hidden{display:none!important;}
  h1.title{font-size:clamp(42px,9vw,96px);font-weight:800;letter-spacing:8px;
    background:linear-gradient(90deg,var(--magenta),var(--cyan));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 30px rgba(67,255,132,.5);margin-bottom:6px;}
  .subtitle{color:#9fb6c9;letter-spacing:4px;font-size:14px;margin-bottom:34px;text-transform:uppercase;}
  .btn{pointer-events:auto;cursor:pointer;border:1.5px solid var(--magenta);
    background:rgba(67,255,132,.08);color:#fff;font-size:18px;letter-spacing:3px;
    padding:14px 40px;border-radius:10px;margin:8px;transition:.15s;
    text-transform:uppercase;font-weight:600;
    box-shadow:0 0 20px rgba(67,255,132,.25);}
  .btn:hover{background:rgba(67,255,132,.25);box-shadow:0 0 34px rgba(67,255,132,.5);transform:translateY(-2px);}
  .btn.cyan{border-color:var(--cyan);background:rgba(155,255,192,.08);box-shadow:0 0 20px rgba(155,255,192,.25);}
  .btn.cyan:hover{background:rgba(155,255,192,.22);box-shadow:0 0 34px rgba(155,255,192,.5);}
  .controls-hint{margin-top:30px;color:#7d8ca0;font-size:13px;line-height:2;max-width:460px;}
  .controls-hint b{color:var(--cyan);font-weight:600;}
  kbd{display:inline-block;border:1px solid #4a5b6d;border-radius:5px;padding:1px 8px;
    margin:0 2px;font-size:12px;background:rgba(255,255,255,.05);color:#cfe;}

  /* language toggle */
  #lang-toggle{position:absolute;top:18px;right:20px;z-index:30;pointer-events:auto;
    cursor:pointer;border:1px solid rgba(155,255,192,.4);background:rgba(155,255,192,.06);
    color:#bff;font-size:13px;letter-spacing:1px;padding:6px 14px;border-radius:8px;
    transition:.15s;}
  #lang-toggle:hover{background:rgba(155,255,192,.18);}

  /* result modal */
  #result h2{font-size:46px;letter-spacing:4px;margin-bottom:4px;}
  #result .reason{color:#ffb3c4;font-size:15px;margin-bottom:18px;white-space:pre-line;min-height:20px;}
  .score-table{width:min(380px,86vw);background:rgba(10,8,24,.6);border:1px solid rgba(155,255,192,.3);
    border-radius:12px;padding:18px 22px;margin-bottom:8px;}
  .score-row{display:flex;justify-content:space-between;font-size:15px;line-height:2.1;
    border-bottom:1px solid rgba(255,255,255,.06);}
  .score-row:last-child{border-bottom:none;}
  .score-row .k{color:#9fb6c9;} .score-row .v{color:var(--cyan);font-weight:600;}
  .score-row.total .k{color:#fff;} .score-row.total .v{color:var(--amber);font-size:22px;}
  .score-row.mult .v{color:var(--magenta);}
  #bigscore{font-size:54px;font-weight:800;color:var(--amber);
    text-shadow:0 0 26px rgba(185,255,61,.5);margin:10px 0 18px;}

  /* mobile touch controls */
  #touch{position:absolute;inset:0;z-index:15;display:none;pointer-events:none;}
  .tbtn{position:absolute;bottom:30px;width:84px;height:84px;border-radius:50%;
    border:2px solid rgba(155,255,192,.5);background:rgba(155,255,192,.08);
    display:flex;align-items:center;justify-content:center;font-size:30px;color:#bff;
    pointer-events:auto;backdrop-filter:blur(2px);}
  .tbtn:active{background:rgba(155,255,192,.25);}
  #t-left{left:24px;} #t-right{left:128px;}
  #t-thrust{right:24px;width:104px;height:104px;border-color:rgba(67,255,132,.6);
    background:rgba(67,255,132,.1);color:#fbf;font-size:38px;}
  .touch-on #touch{display:block;}
  body.demo-on #touch{display:none!important;}   /* demo is autopilot-only: no manual controls */

  /* one-tap auto-land toggle */
  #auto-btn{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:16;
    pointer-events:auto;cursor:pointer;border:1.5px solid rgba(185,255,61,.6);
    background:rgba(185,255,61,.08);color:#ffd479;font-size:13px;font-weight:600;
    letter-spacing:2px;padding:8px 18px;border-radius:20px;transition:.15s;
    text-transform:uppercase;box-shadow:0 0 14px rgba(185,255,61,.2);}
  #auto-btn:hover{background:rgba(185,255,61,.2);}
  #auto-btn.on{border-color:var(--amber);background:rgba(185,255,61,.22);color:#fff;
    box-shadow:0 0 22px rgba(185,255,61,.6);animation:autopulse 1.4s ease-in-out infinite;}
  @keyframes autopulse{0%,100%{box-shadow:0 0 18px rgba(185,255,61,.45);}50%{box-shadow:0 0 30px rgba(185,255,61,.8);}}

  #demo-badge{position:absolute;top:54px;left:50%;transform:translateX(-50%);z-index:16;
    pointer-events:auto;cursor:pointer;color:#ffd479;font-size:11px;font-weight:700;letter-spacing:2px;
    padding:6px 16px;border-radius:14px;border:1px solid rgba(185,255,61,.5);
    background:rgba(20,10,0,.6);text-transform:uppercase;transition:.15s;}
  #demo-badge:hover{background:rgba(185,255,61,.25);border-color:var(--bad);color:#fff;}

  /* time-speed control (single cycling pill) */
  #speed-btn{position:absolute;bottom:14px;right:14px;z-index:16;pointer-events:auto;cursor:pointer;
    border:1px solid rgba(155,255,192,.35);background:rgba(8,6,20,.55);color:#bff;font-size:12px;
    font-weight:600;padding:6px 12px;border-radius:14px;min-width:50px;font-variant-numeric:tabular-nums;
    backdrop-filter:blur(3px);transition:.12s;letter-spacing:.5px;}
  #speed-btn:hover{background:rgba(155,255,192,.18);}
  #speed-btn.fast{background:rgba(155,255,192,.22);border-color:var(--cyan);color:#fff;
    box-shadow:0 0 14px rgba(155,255,192,.45);}
  body.touch-on #speed-btn{bottom:150px;right:18px;}

  #approach-badge{position:absolute;top:18%;left:50%;transform:translateX(-50%);z-index:18;
    pointer-events:none;color:#bff;font-size:clamp(15px,3.4vw,22px);font-weight:800;letter-spacing:6px;
    text-transform:uppercase;text-shadow:0 0 18px rgba(155,255,192,.7);opacity:.9;white-space:nowrap;
    animation:appblink 1s ease-in-out infinite;}
  @keyframes appblink{0%,100%{opacity:.35;}50%{opacity:.95;}}

  #version{position:absolute;bottom:10px;right:14px;color:#3a4656;font-size:11px;letter-spacing:1px;}

  /* ---------- CRT / vector tube overlay ---------- */
  #crt{position:fixed;inset:0;z-index:40;pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.16) 3px, rgba(0,0,0,0) 4px),
      radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0) 52%, rgba(0,0,0,.55) 100%);
    animation:crtflick 4s steps(40) infinite;}
  @keyframes crtflick{0%,100%{opacity:1}48%{opacity:.96}52%{opacity:.99}}
  body{ text-shadow:0 0 6px rgba(67,255,132,.35); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <button id="lang-toggle">中文</button>
  <button id="auto-btn" class="hidden">AUTO-LAND: OFF</button>
  <div id="demo-badge" class="hidden">DEMO</div>
  <div id="approach-badge" class="hidden">APPROACH</div>
  <button id="speed-btn" class="hidden">1&times;</button>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="panel">
      <div class="stat"><span class="lbl" data-i18n="fuel">FUEL</span><span class="val" id="s-fuel">100%</span></div>
      <div id="fuelbar"><div id="fuelfill"></div></div>
      <div class="stat" style="margin-top:8px"><span class="lbl" data-i18n="alt">ALT</span><span class="val" id="s-alt">0 m</span></div>
    </div>
    <div class="panel" id="right-panel">
      <div class="stat"><span class="lbl" data-i18n="vspd">V-SPD</span><span class="val" id="s-vy">0.0</span></div>
      <div class="stat"><span class="lbl" data-i18n="hspd">H-SPD</span><span class="val" id="s-vx">0.0</span></div>
      <div class="stat"><span class="lbl" data-i18n="tilt">TILT</span><span class="val" id="s-tilt">0&deg;</span></div>
      <div class="stat"><span class="lbl" data-i18n="target">TARGET</span><span class="val" id="target-dist">&mdash;</span></div>
    </div>
  </div>

  <!-- touch controls -->
  <div id="touch">
    <div class="tbtn" id="t-left">&#9668;</div>
    <div class="tbtn" id="t-right">&#9658;</div>
    <div class="tbtn" id="t-thrust">&#9650;</div>
  </div>

  <!-- main menu -->
  <div id="menu" class="screen">
    <h1 class="title">DASHLANDER</h1>
    <div class="subtitle" data-i18n="subtitle">SPHERICAL LUNAR LANDER</div>
    <button class="btn" id="play-btn" data-i18n="play">START MISSION</button>
    <button class="btn cyan" id="new-seed-btn" data-i18n="random">RANDOM LEVEL</button>
    <button class="btn" id="demo-btn" data-i18n="demo" style="border-color:var(--amber);background:rgba(185,255,61,.08);box-shadow:0 0 20px rgba(185,255,61,.25)">AUTO DEMO</button>
    <div class="controls-hint" id="hint"></div>
  </div>

  <!-- result modal -->
  <div id="result" class="screen hidden">
    <h2 id="result-title">LANDED</h2>
    <div class="reason" id="result-reason"></div>
    <div id="score-block">
      <div class="score-table">
        <div class="score-row"><span class="k" data-i18n="scFuel">Fuel score</span><span class="v" id="sc-fuel">0</span></div>
        <div class="score-row"><span class="k" data-i18n="scVel">Velocity score</span><span class="v" id="sc-vel">0</span></div>
        <div class="score-row"><span class="k" data-i18n="scTilt">Attitude score</span><span class="v" id="sc-tilt">0</span></div>
        <div class="score-row mult"><span class="k" data-i18n="scMult">Difficulty</span><span class="v" id="sc-mult">&times;1.0</span></div>
        <div class="score-row total"><span class="k" data-i18n="scTotal">Total</span><span class="v" id="sc-total">0</span></div>
      </div>
      <div id="bigscore">0</div>
    </div>
    <div>
      <button class="btn" id="retry-btn" data-i18n="retry">RETRY</button>
      <button class="btn cyan" id="next-btn" data-i18n="next">NEXT LEVEL</button>
      <button class="btn" id="menu-btn" data-i18n="menu" style="border-color:#5a6b7d;box-shadow:none">MENU</button>
    </div>
  </div>

  <div id="crt"></div>
  <div id="version">v1.0 &middot; vector mode</div>
</div>

<script>
"use strict";
/* =========================================================================
   DASHLANDER — a spherical lunar lander, written in plain HTML/CSS/JS.
   Gravity always points toward the centre of a circular moon; the camera
   rotates so the surface stays beneath the ship at all times.
   ========================================================================= */

// ----------------------------- i18n --------------------------------------
const I18N = {
  en: {
    lang:"中文",
    subtitle:"Spherical Lunar Lander",
    play:"Start Mission",
    random:"Random Level",
    fuel:"FUEL", alt:"ALT", vspd:"V-SPD", hspd:"H-SPD", tilt:"TILT", target:"TARGET",
    hint:`Land safely on a <b>green pad</b> on the spherical moon.<br>
      Touchdown needs: tilt &lt; 20&deg;, vertical &lt; 3 m/s, horizontal &lt; 2 m/s.<br><br>
      <kbd>&uarr;</kbd>/<kbd>W</kbd>/<kbd>Space</kbd> main thruster&nbsp;&nbsp;
      <kbd>&larr;</kbd><kbd>&rarr;</kbd>/<kbd>A</kbd><kbd>D</kbd> rotate<br>
      <kbd>R</kbd> restart&nbsp;&nbsp;<kbd>Esc</kbd> menu`,
    won:"LANDED \u2726", lost:"MISSION FAILED \u2715",
    perfect:"Perfect touchdown on the target pad",
    crashed:"Vehicle destroyed",
    rNotPad:"Did not land on a pad",
    rTilt:"Tilt exceeded limit by ", rVert:"Vertical speed exceeded limit by ",
    rHorz:"Horizontal slide exceeded limit by ", rSpace:"Lost contact in deep space",
    scFuel:"Fuel score", scVel:"Velocity score", scTilt:"Attitude score",
    scMult:"Difficulty", scTotal:"Total",
    retry:"Retry", next:"Next Level", menu:"Menu",
    tLeft:"\u25C4 L", tRight:"R \u25BA", tBelow:"\u25BC BELOW",
    autoland:"Auto-Land", on:"ON", off:"OFF",
    demo:"Auto Demo", demobadge:"DEMO \u2715 STOP", approach:"\u25B8 APPROACH \u25C2",
  },
  zh: {
    lang:"EN",
    subtitle:"球形月球登月小艇",
    play:"開始任務",
    random:"隨機關卡",
    fuel:"燃料", alt:"高度", vspd:"垂直", hspd:"水平", tilt:"傾角", target:"目標",
    hint:`在<b>球形月球</b>上找到綠色降落台並安全著陸。<br>
      著陸需：傾角 &lt; 20&deg;、垂直 &lt; 3 m/s、水平 &lt; 2 m/s。<br><br>
      <kbd>&uarr;</kbd>/<kbd>W</kbd>/<kbd>Space</kbd> 主引擎推進&nbsp;&nbsp;
      <kbd>&larr;</kbd><kbd>&rarr;</kbd>/<kbd>A</kbd><kbd>D</kbd> 左右旋轉<br>
      <kbd>R</kbd> 重來&nbsp;&nbsp;<kbd>Esc</kbd> 選單`,
    won:"著陸成功 \u2726", lost:"任務失敗 \u2715",
    perfect:"完美降落於目標平台",
    crashed:"飛船墜毀",
    rNotPad:"未降落在降落台上",
    rTilt:"傾角超出上限 ", rVert:"垂直速度超標 ",
    rHorz:"水平滑行超標 ", rSpace:"飛入深空，失去聯繫",
    scFuel:"燃料分數", scVel:"速度分數", scTilt:"姿態分數",
    scMult:"難度倍率", scTotal:"總分",
    retry:"重試本關", next:"下一關", menu:"選單",
    tLeft:"\u25C4 左", tRight:"右 \u25BA", tBelow:"\u25BC 正下",
    autoland:"自動降落", on:"開", off:"關",
    demo:"自動示範", demobadge:"自動示範 \u2715 停止", approach:"\u25B8 進場中 \u25C2",
  }
};
let LANG = "en";
const T = k => I18N[LANG][k];

function applyI18n(){
  document.documentElement.lang = (LANG==="zh"?"zh-Hant":"en");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k=el.getAttribute("data-i18n");
    if(I18N[LANG][k]!==undefined) el.innerHTML=I18N[LANG][k];
  });
  document.getElementById("hint").innerHTML = T("hint");
  document.getElementById("lang-toggle").textContent = T("lang");
  refreshAutoBtn();
  $("demo-badge").textContent=T("demobadge");
  $("approach-badge").textContent=T("approach");
  if(gameState===STATE.OVER && ship) refreshResultText();
}

// ----------------------------- constants ---------------------------------
const C = {
  lunarGravity: 3.2,            // m/s^2, toward moon centre
  standardGravity: 9.80665,
  moonRadius: 1000,
  moonRadiusVar: 0.2,
  terrainSegments: 80,
  terrainSegmentsVar: 0.2,
  maxTerrainHeight: 300,
  maxTerrainHeightVar: 0.75,
  noiseFrequency: 4.5,
  noiseFrequencyVar: 0.3,
  numLandingPads: 3,
  numLandingPadsVar: 0.66,
  padWidthSegments: 2,
  padWidthSegmentsVar: 0.5,
  dryMass: 4280,
  engineMaxThrust: 45040 * 1.8,
  specificImpulse: 311,
  baseInertia: 50000,
  rcsSteeringTorque: 25000,
  rcsLeverArm: 10,
  defaultMaxFuel: 1000,
  shipRadius: 14,
  deepSpaceBoundary: 2000,
  crustBoundary: 1000,
  cameraZoomSurfaceRatio: 0.8,
  initialVelocityX: 28.0,   // fast horizontal entry: the moon visibly sweeps past, then slows
  initialVelocityXVar: 0.1,
  initialVelocityY: 0.0,
  initialVelocityYVar: 0.2,
  startAltitude: 600,       // higher start: room to bleed off horizontal speed
  startAltitudeVar: 0.15,
  shipVisualHeight: 34,
  shipRealHeightMeters: 3,
};
C.pixelsPerMeter = C.shipVisualHeight / C.shipRealHeightMeters;   // ~= 11.333
C.maxCameraVisibleDistance = C.deepSpaceBoundary / C.cameraZoomSurfaceRatio;

// touchdown limits & scoring caps
const LIMIT = { tiltDeg: 20, velY: 3.0, velX: 2.0 };
const SCORE_MAX = { vel: 5000, tilt: 2500, fuel: 2500 };

// ----------------------------- helpers -----------------------------------
const TWO_PI = Math.PI * 2;
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function easeIn(t){ return t*t; }
function len(x,y){return Math.hypot(x,y);}

// seeded PRNG (mulberry32)
function makeRNG(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ----------------------------- level generation --------------------------
function generateLevel(seed){
  const rng = makeRNG(seed);
  const scaleFactor = rng()*2-1;
  const variance = (base,v,r)=> base*(1+v*r);

  const radius   = variance(C.moonRadius, C.moonRadiusVar, scaleFactor);
  const segments = Math.max(24, Math.round(variance(C.terrainSegments, C.terrainSegmentsVar, scaleFactor)));
  const maxH     = variance(C.maxTerrainHeight, C.maxTerrainHeightVar, rng()*2-1);
  const freq     = variance(C.noiseFrequency, C.noiseFrequencyVar, rng()*2-1);
  let padsCount  = clamp(Math.round(variance(C.numLandingPads, C.numLandingPadsVar, rng()*2-1)), 1, segments);
  const padWidth = clamp(Math.round(variance(C.padWidthSegments, C.padWidthSegmentsVar, rng()*2-1)), 1, Math.floor(segments/4));

  let vX = variance(C.initialVelocityX, C.initialVelocityXVar, rng()*2-1);
  if (rng() < 0.5) vX = -vX;
  const vY = variance(C.initialVelocityY, C.initialVelocityYVar, rng()*2-1);

  // height field: sine waves (rolling hills) + noise (small craters)
  const heights = new Array(segments);
  for(let i=0;i<segments;i++){
    const t = (i/segments)*TWO_PI;
    let h = Math.sin(t*freq)*maxH*0.5 + Math.cos(t*freq*2.3)*maxH*0.25;
    h += rng()*maxH*0.25;
    heights[i] = h;
  }

  // wrap the height field into 2D cartesian points (-Y is up)
  const pts = [];
  for(let i=0;i<segments;i++){
    const t=(i/segments)*TWO_PI, R=radius+heights[i];
    pts.push({x:Math.sin(t)*R, y:-Math.cos(t)*R});
  }

  // tilt of a candidate pad relative to the spherical normal
  function relTilt(px,py,absDeg){
    const sn = ((Math.atan2(px, -py)*180/Math.PI)%360+360)%360;
    let d = absDeg - sn;
    while(d>180)d-=360; while(d<=-180)d+=360;
    return d;
  }
  function absAngleDeg(nx,ny){ let a=Math.atan2(nx,-ny)*180/Math.PI; a=((a%360)+360)%360; return a; }
  function padTilt(p){
    const a=pts[p], b=pts[(p+padWidth)%segments];
    const dx=b.x-a.x, dy=b.y-a.y;
    let nx=-dy, ny=dx; const L=len(nx,ny)||1; nx/=L; ny/=L;
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    if(nx*mx+ny*my<0){nx=-nx;ny=-ny;}
    return Math.abs(relTilt(mx,my,absAngleDeg(nx,ny)));
  }

  // first pad sits further away (60deg..180deg); others are random & spaced out
  const padIndices=[];
  const minIdx=Math.max(2,Math.floor(segments*60/360));
  const maxIdx=Math.floor(segments/2);
  const distFactor=Math.pow(rng(),2);
  let winStart=minIdx+Math.floor(distFactor*(maxIdx-minIdx));
  let best=winStart, bestT=Infinity;
  for(let i=winStart;i<=winStart+10;i++){const t=padTilt(i%segments); if(t<bestT){bestT=t;best=i%segments;}}
  padIndices.push(best);
  let toPlace=padsCount-1, attempts=padsCount*50;
  while(toPlace>0 && attempts-->0){
    const idx=Math.floor(rng()*(segments-padWidth));
    let ok=true;
    for(const p of padIndices){ if(Math.abs(p-idx)<padWidth*3){ok=false;break;} }
    if(ok){
      let allow=10; if(attempts<padsCount*25)allow=15; if(attempts<padsCount*10)allow=25;
      if(padTilt(idx)>allow) ok=false;
    }
    if(ok){padIndices.push(idx);toPlace--;}
  }

  // flatten each pad into a straight secant line and tag it
  const isPad=new Array(segments).fill(false);
  const padMult=new Array(segments).fill(1);
  for(const p of padIndices){
    const a=pts[p], b=pts[(p+padWidth)%segments];
    for(let i=1;i<padWidth;i++){
      const idx=(p+i)%segments, t=i/padWidth;
      pts[idx]={x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t};
    }
    // multiplier: further pads score higher (0.5..2.0), tuned by pad width
    const dist=Math.min(p,segments-p), distDeg=(dist/segments)*360;
    let m=0.5+(distDeg/180)*1.5;
    if(padWidth===1)m*=1.5; else if(padWidth===3)m*=0.75; else if(padWidth>3)m*=0.5;
    for(let i=0;i<padWidth;i++){ isPad[(p+i)%segments]=true; padMult[(p+i)%segments]=m; }
  }

  const poly = pts.concat([{x:pts[0].x,y:pts[0].y}]);   // close the loop

  // spawn just above the top of the moon
  const startAlt = variance(C.startAltitude, C.startAltitudeVar, rng()*2-1);
  const startR = radius + heights[0] + startAlt;
  const start = {x:0, y:-startR};
  const initVel = {x:vX*C.pixelsPerMeter, y:vY*C.pixelsPerMeter};

  return {seed, radius, segments, points:poly, isPad, padMult,
          start, initVel, maxFuel:C.defaultMaxFuel};
}

// ----------------------------- ship state --------------------------------
function makeShip(level){
  return {
    px:level.start.x, py:level.start.y,
    vx:level.initVel.x, vy:level.initVel.y,
    angle:0, angVel:0,                       // nose up (radial); approach flares to brake

    fuel:level.maxFuel,
    thrusting:false, torque:0,
    crashed:false, landed:false,
    crashKey:"", crashAmount:0,
    gForce:0, maxG:0,
    padMultHit:1,
    finalTilt:0, impactV:0, impactH:0,
    _ended:false,
    get mass(){ return C.dryMass + this.fuel; }
  };
}

// ----------------------------- physics step ------------------------------
function physicsStep(s, dt){
  if(s.crashed||s.landed) return;
  const hasFuel = s.fuel>0;

  let mainThrust=0, rcsThrust=0, torque=s.torque;
  if(s.thrusting && hasFuel) mainThrust=C.engineMaxThrust; else s.thrusting=false;
  if(torque!==0 && hasFuel) rcsThrust=Math.abs(torque)/C.rcsLeverArm; else torque=0;

  if(mainThrust>0 || rcsThrust>0){
    const flow=(mainThrust+rcsThrust)/(C.specificImpulse*C.standardGravity);
    s.fuel=Math.max(0, s.fuel-flow*dt);
  }

  // gravity points toward the centre (0,0)
  const d=len(s.px,s.py)||1;
  const gx=-s.px/d, gy=-s.py/d;
  const gAccel=C.lunarGravity*C.pixelsPerMeter;
  let fx=gx*gAccel*s.mass, fy=gy*gAccel*s.mass;
  const gravFx=fx, gravFy=fy;

  if(s.thrusting){
    const tp=mainThrust*C.pixelsPerMeter;
    fx+=Math.sin(s.angle)*tp;
    fy+=-Math.cos(s.angle)*tp;
  }

  // G-force = magnitude of non-gravitational acceleration
  if(s.thrusting){
    const ax=(fx-gravFx)/s.mass/C.pixelsPerMeter;
    const ay=(fy-gravFy)/s.mass/C.pixelsPerMeter;
    s.gForce=len(ax,ay)/C.standardGravity;
    if(s.gForce>s.maxG)s.maxG=s.gForce;
  } else s.gForce=0;

  // semi-implicit Euler integration
  const ax=fx/s.mass, ay=fy/s.mass;
  s.vx+=ax*dt; s.vy+=ay*dt;
  s.px+=s.vx*dt; s.py+=s.vy*dt;
  const angAcc=torque/C.baseInertia;
  s.angVel+=angAcc*dt; s.angle+=s.angVel*dt;
}

function deg360(rad){ let d=(rad*180/Math.PI)%360; if(d<0)d+=360; return d; }
function relTiltDeg(px,py,absDeg){
  const sn=deg360(Math.atan2(px,-py));
  let d=(((absDeg%360)+360)%360)-sn;
  while(d>180)d-=360; while(d<=-180)d+=360;
  return d;
}

// ----------------------------- collision & landing ----------------------
function checkCollision(s, level){
  if(s.crashed||s.landed) return;
  const segs=level.segments;
  const alt = len(s.px,s.py) - level.radius;
  if(alt > C.deepSpaceBoundary){ s.crashed=true; s.crashKey="rSpace"; return; }

  let ang=Math.atan2(s.px,-s.py); if(ang<0)ang+=TWO_PI;
  const baseIdx=Math.floor(ang/TWO_PI*segs)%segs;

  for(let off=-2;off<=2;off++){
    const i=((baseIdx+off)%segs+segs)%segs;
    const a=level.points[i], b=level.points[i+1];
    const dx=b.x-a.x, dy=b.y-a.y;
    const segLen2=dx*dx+dy*dy||1;
    let t=((s.px-a.x)*dx+(s.py-a.y)*dy)/segLen2; t=clamp(t,0,1);
    const cx=a.x+dx*t, cy=a.y+dy*t;
    const dist=len(s.px-cx, s.py-cy);
    if(dist<=C.shipRadius){
      let nx=-dy, ny=dx; const L=len(nx,ny)||1; nx/=L; ny/=L;
      const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
      if(nx*mx+ny*my<0){nx=-nx;ny=-ny;}     // outward normal
      const surfAngleDeg=deg360(Math.atan2(nx,-ny));
      validateLanding(s, level, i, surfAngleDeg, nx, ny);
      return;
    }
  }
}

function validateLanding(s, level, segIdx, surfaceAngleDeg, nx, ny){
  const angleDeg=deg360(s.angle);
  let diff=Math.abs(angleDeg-surfaceAngleDeg);
  const tilt=Math.min(diff,360-diff);
  const fallSpeed=-(s.vx*nx+s.vy*ny);            // toward surface = positive
  const tx=-ny, ty=nx;                            // tangent
  const slide=Math.abs(s.vx*tx+s.vy*ty);

  const upright = tilt<=LIMIT.tiltDeg;
  const slowV   = fallSpeed <= LIMIT.velY*C.pixelsPerMeter;
  const slowH   = slide     <= LIMIT.velX*C.pixelsPerMeter;
  const onPad   = level.isPad[segIdx];

  s.finalTilt=tilt;
  s.impactV = fallSpeed/C.pixelsPerMeter;
  s.impactH = slide/C.pixelsPerMeter;

  if(upright && slowV && slowH && onPad){
    s.landed=true;
    s.padMultHit=level.padMult[segIdx]||1;
  } else {
    s.crashed=true;
    if(!onPad){ s.crashKey="rNotPad"; }
    else if(!upright){ s.crashKey="rTilt"; s.crashAmount=tilt-LIMIT.tiltDeg; }
    else if(!slowV){ s.crashKey="rVert"; s.crashAmount=fallSpeed/C.pixelsPerMeter-LIMIT.velY; }
    else if(!slowH){ s.crashKey="rHorz"; s.crashAmount=slide/C.pixelsPerMeter-LIMIT.velX; }
  }
}

// ----------------------------- scoring -----------------------------------
function computeScore(s, level){
  const curve=(v)=> v>=0 ? easeIn(v) : -easeIn(-v);
  const fuelAcc=clamp(s.fuel/level.maxFuel,0,1);
  const fuelScore=Math.round(easeIn(fuelAcc)*SCORE_MAX.fuel);

  const vAcc=clamp(1-(s.impactV/LIMIT.velY),0,1);
  const velScore=Math.round(curve(vAcc*2-1)*SCORE_MAX.vel);

  const tAcc=clamp(1-(s.finalTilt/LIMIT.tiltDeg),0,1);
  const tiltScore=Math.round(curve(tAcc*2-1)*SCORE_MAX.tilt);

  let total=fuelScore+velScore+tiltScore; if(total<0)total=0;
  const mult=s.padMultHit;
  const finalScore=Math.round(total*mult);
  return {fuelScore,velScore,tiltScore,total,mult,finalScore};
}

// ----------------------------- particles ---------------------------------
const particles=[];
function spawnExhaust(x,y,emitAngle,svx,svy,radius,col){
  const spread=()=> (Math.random()-0.5)*50;
  particles.push({
    x,y,
    vx: svx + Math.sin(emitAngle)*100 + spread(),
    vy: svy - Math.cos(emitAngle)*100 + spread(),
    life:1, r:radius,
    col: col || (Math.random()<0.5 ? "#bfffd2" : "#46ff85"),
  });
}
function spawnExplosion(x,y){
  for(let i=0;i<60;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*260, vy:(Math.random()-0.5)*260,
      life:1+Math.random(), r:6,
      col: Math.random()<0.5?"#46ff85":"#bfffd2",
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*2;
    if(p.life<=0) particles.splice(i,1);
  }
}

for(let i=0;i<160;i++){

// ----------------------------- auto-land controller ---------------------
// One-button autopilot: pick the safest (flat, wide, near) pad, cruise above
// the terrain to its centre, then commit to a slow, upright vertical descent
// onto the pad surface. Binary thrust becomes effective proportional thrust
// via PWM duty cycling; the attitude command is low-pass filtered so the craft
// can hold a steady cruise tilt instead of hunting.
let _pwm=0;
function padCenter(level, phiS){
  // gather contiguous pad runs, pick the safest: flat surface preferred, then near
  if(!level._pads){
    const segs=level.segments, runs=[]; let i=0;
    while(i<segs){
      if(level.isPad[i]){
        let j=i; while(level.isPad[(j+1)%segs] && j-i<segs) j++;
        const a=level.points[i], b=level.points[(j+1)%segs];
        const cx=(a.x+b.x)/2, cy=(a.y+b.y)/2;
        // surface tilt of this pad relative to the radial (spherical) normal
        let nxx=-(b.y-a.y), nyy=(b.x-a.x); const L=len(nxx,nyy)||1; nxx/=L; nyy/=L;
        if(nxx*cx+nyy*cy<0){nxx=-nxx;nyy=-nyy;}
        const surfDeg=deg360(Math.atan2(nxx,-nyy));
        const tilt=Math.abs(relTiltDeg(cx,cy,surfDeg));
        runs.push({ang:Math.atan2(cx,-cy), alt:(len(cx,cy)-level.radius)/C.pixelsPerMeter,
                    tilt, width:(j-i+1)});
        i=j+1;
      } else i++;
    }
    level._pads=runs.length?runs:[{ang:0,alt:0,tilt:0,width:1}];
  }
  let best=null,bestCost=Infinity;
  for(const p of level._pads){
    let da=p.ang-phiS; while(da>Math.PI)da-=TWO_PI; while(da<=-Math.PI)da+=TWO_PI;
    const distDeg=Math.abs(da)*180/Math.PI;
    // strongly prefer flat, landable pads; gentle distance tiebreak
    const cost = p.tilt*6 + distDeg*1.0 - p.width*4;
    if(cost<bestCost){bestCost=cost;best=p;}
  }
  return best;
}
function autopilot(s, level){
  const ppm=C.pixelsPerMeter, gPix=C.lunarGravity*ppm;
  const maxAcc=C.engineMaxThrust*ppm/s.mass;
  const d=len(s.px,s.py)||1;
  const nx=s.px/d, ny=s.py/d, tx=-ny, ty=nx;
  const vr=s.vx*nx+s.vy*ny, vt=s.vx*tx+s.vy*ty;
  const altM=(d-level.radius)/ppm, vtM=vt/ppm;
  const upAngle=Math.atan2(nx,-ny);

  const phiS=Math.atan2(s.px,-s.py);
  const pc=padCenter(level,phiS);
  let da=pc.ang-phiS; while(da>Math.PI)da-=TWO_PI; while(da<=-Math.PI)da+=TWO_PI;
  const arcErrM=da*level.radius/ppm;
  const hgtM=altM-pc.alt;                 // height above the target pad surface

  if(s._tilt===undefined){s._tilt=0; s._stable=0; s._desc=false;}

  // phase latch: cruise -> (stable over pad) -> descend -> final upright sink
  const tight=Math.abs(arcErrM)<0.7 && Math.abs(vtM)<0.35;
  s._stable = tight ? s._stable+1 : 0;
  if(!s._desc && s._stable>45 && altM<55) s._desc=true;
  if(s._desc && altM>10 && Math.abs(arcErrM)>4) s._desc=false;
  const FINAL = s._desc && hgtM<5;

  // lateral: time-optimal arrive target -> tilt command (low-pass filtered)
  const aLatAssume=0.9, vtMaxM=Math.min(6, 1.5+altM*0.12);
  let vtTgtM=clamp(Math.sign(arcErrM)*Math.sqrt(2*aLatAssume*Math.abs(arcErrM)),-vtMaxM,vtMaxM);
  if(FINAL) vtTgtM=0;
  const aH=(vtTgtM*ppm - vt)*1.1;
  let tiltCmd=Math.asin(clamp(aH/maxAcc,-1,1));
  const MAXTILT = FINAL?0.03 : (s._desc?0.18:0.42);
  tiltCmd=clamp(tiltCmd,-MAXTILT,MAXTILT);
  s._tilt += (tiltCmd - s._tilt)*(FINAL?0.25:0.08);

  // vertical profile
  let vrTgt;
  if(FINAL){ vrTgt=-0.7*ppm; }
  else if(s._desc){ const dm=clamp(0.3*hgtM+0.3,0.4,1.6); vrTgt=clamp(0.7*(0-hgtM),-dm,1.0)*ppm; }
  else { vrTgt=clamp(0.7*(50-altM),-2.5,2.5)*ppm; }
  const aV=1.8*(vrTgt - vr);

  // orientation PD -> bang-bang RCS
  const targetAngle=upAngle+s._tilt;
  let aerr=targetAngle - s.angle; while(aerr>Math.PI)aerr-=TWO_PI; while(aerr<=-Math.PI)aerr+=TWO_PI;
  const cmd=8.0*aerr - 3.2*s.angVel;
  s.torque = cmd>0.06? C.rcsSteeringTorque : (cmd<-0.06? -C.rcsSteeringTorque : 0);

  // PWM throttle: average thrust ~ needed accel / max accel
  const needAcc=(aV+gPix)/Math.max(0.4,Math.cos(s._tilt));
  let duty=clamp(needAcc/Math.max(1,maxAcc),0,1);
  if(Math.cos(aerr)<0.55) duty=0;
  _pwm+=duty;
  if(_pwm>=1){ s.thrusting=true; _pwm-=1; } else s.thrusting=false;
}

// ---------- approach intro: fly in horizontally and bleed off speed ----------
function approachControl(s){
  const ppm=C.pixelsPerMeter, gPix=C.lunarGravity*ppm;
  const maxAcc=C.engineMaxThrust*ppm/s.mass;
  const d=len(s.px,s.py)||1;
  const nx=s.px/d, ny=s.py/d, tx=-ny, ty=nx;
  const vr=s.vx*nx+s.vy*ny, vt=s.vx*tx+s.vy*ty;
  const upAngle=Math.atan2(nx,-ny);
  // cosmetic pitch-back: lean into the brake while fast, ease upright as it slows
  const speedFrac=clamp(Math.abs(vt)/(28*ppm),0,1);
  const tilt=clamp(-Math.sign(vt||1)*apMaxTilt*speedFrac, -apMaxTilt, apMaxTilt);
  const targetAngle=upAngle+tilt;
  let aerr=targetAngle-s.angle; while(aerr>Math.PI)aerr-=TWO_PI; while(aerr<=-Math.PI)aerr+=TWO_PI;
  const cmd=8*aerr-3.2*s.angVel;
  s.torque=cmd>0.06?C.rcsSteeringTorque:(cmd<-0.06?-C.rcsSteeringTorque:0);
  // hold altitude with vertical thrust (engine fires -> exhaust shows; never crashes)
  const aV=1.4*(0 - vr);
  const needAcc=(aV+gPix)/Math.max(0.4,Math.cos(tilt));
  let duty=clamp(needAcc/Math.max(1,maxAcc),0,1)*Math.max(0,Math.cos(aerr));
  _pwm+=duty; if(_pwm>=1){s.thrusting=true;_pwm-=1;}else s.thrusting=false;
}

// ---------- fixed-step loop ----------
const FIXED=1/60;
let acc=0, lastT=performance.now(), overTimer=0;

function fixedUpdate(dt){
  if(gameState!==STATE.PLAYING) return;
  if(approaching){
    approachControl(ship);                   // scripted entry; input & autopilot locked out
    approachT+=dt;
    if(approachT>=apTime){
      approaching=false;
      $("approach-badge").classList.add("hidden");
      if(autopilotOn){ ship._tilt=0; ship._stable=0; ship._desc=false; _pwm=0; } // hand off cleanly
    }
  } else if(autopilotOn){
    autopilot(ship, level);                 // controller sets thrusting & torque
  } else {
    ship.thrusting=input.up;
    ship.torque=0;
    if(input.left)  ship.torque-=C.rcsSteeringTorque;
    if(input.right) ship.torque+=C.rcsSteeringTorque;
  }

  physicsStep(ship,dt);
  if(approaching){
    // scripted deceleration so the sweeping terrain visibly slows (fast -> slow)
    const d=len(ship.px,ship.py)||1, nx=ship.px/d, ny=ship.py/d, tx=-ny, ty=nx;
    const vt=ship.vx*tx+ship.vy*ty;
    const f=Math.pow(apDecay, 1/(apTime*60));    // decay tangential speed toward the handoff target
    const dv=vt*f - vt;
    ship.vx+=dv*tx; ship.vy+=dv*ty;
  }
  checkCollision(ship,level);

  // exhaust particles (local offsets rotated into world space)
  const ca=Math.cos(ship.angle), sa=Math.sin(ship.angle);
  const toWorld=(lx,ly)=>({x:ship.px+(lx*ca-ly*sa), y:ship.py+(lx*sa+ly*ca)});
  if(ship.thrusting && ship.fuel>0 && !ship.crashed && !ship.landed){
    const o=toWorld(0,12);                          // engine at ship base (0,12)
    for(let i=0;i<3;i++)
      spawnExhaust(o.x,o.y, ship.angle+Math.PI, ship.vx, ship.vy, 4);
  }
  if(ship.torque!==0 && ship.fuel>0 && !ship.crashed && !ship.landed){
    const side = ship.torque<0 ? -1 : 1;            // CCW fires from left side
    const o=toWorld(10*side, 8);
    spawnExhaust(o.x,o.y, ship.angle + side*Math.PI/2, ship.vx, ship.vy, 2, "#d6ffe6");
  }

  // camera: rotate so the surface stays below; zoom out when high
  camAngle=Math.atan2(ship.px,-ship.py);
  const alt=Math.max(0, len(ship.px,ship.py)-level.radius);
  const minVis=H/2;
  const zoomStart=minVis*C.cameraZoomSurfaceRatio;
  if(alt<=zoomStart) camZoom=1;
  else{
    const target=Math.min(alt/C.cameraZoomSurfaceRatio, C.maxCameraVisibleDistance);
    camZoom=minVis/target;
  }

  if((ship.crashed||ship.landed) && !ship._ended){
    ship._ended=true; overTimer=ship.crashed?0.9:0.6;
    if(ship.crashed){ spawnExplosion(ship.px,ship.py); shake=14; }
  }
  if(ship._ended){
    overTimer-=dt;
    if(overTimer<=0 && gameState===STATE.PLAYING) endGame();
  }
}

// ---------- rendering ----------
function worldTransform(){
  ctx.translate(W/2, H/2);
  if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); }
  ctx.scale(camZoom,camZoom);
  ctx.rotate(-camAngle);
  ctx.translate(-ship.px, -ship.py);
}

function drawStars(){
  ctx.save();
  ctx.translate(W/2,H/2);
  const px=ship?ship.px*0.04:0, py=ship?ship.py*0.04:0;
  ctx.rotate(-camAngle*0.3);
  ctx.fillStyle="#46ff85";
  for(const s of stars){
    let sx=((s.x-px)%3000+3000)%3000-1500;
    let sy=((s.y-py)%3000+3000)%3000-1500;
    ctx.globalAlpha=s.alpha*0.45;
    ctx.beginPath(); ctx.arc(sx,sy,s.size*0.8,0,TWO_PI); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawTerrain(){
  const pts=level.points;
  // occlude interior (black tube)
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath(); ctx.fillStyle="#000600"; ctx.fill();

  // glowing green wireframe surface
  ctx.lineJoin="round"; ctx.lineCap="round";
  ctx.shadowColor="#46ff85"; ctx.shadowBlur=12;
  ctx.strokeStyle="rgba(70,255,133,0.9)"; ctx.lineWidth=2/camZoom; ctx.stroke();
  ctx.shadowBlur=0; ctx.strokeStyle="#cfffe0"; ctx.lineWidth=0.8/camZoom; ctx.stroke();  // bright core

  // landing pads: brighter & thicker, with end brackets
  for(let i=0;i<level.segments;i++){
    if(!level.isPad[i]) continue;
    const a=pts[i], b=pts[i+1];
    let nx=-(b.y-a.y), ny=(b.x-a.x); const L=len(nx,ny)||1; nx/=L; ny/=L;
    if(nx*((a.x+b.x)/2)+ny*((a.y+b.y)/2)<0){nx=-nx;ny=-ny;}
    ctx.shadowColor="#cfffe0"; ctx.shadowBlur=16;
    ctx.strokeStyle="#e6fff0"; ctx.lineWidth=3.2/camZoom;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    // short support legs pointing down into the surface (⊔ look), inset from the ends
    const tx=-ny, ty=nx;                       // along-pad tangent
    const inset=Math.min(6/camZoom, L*0.25), legLen=6/camZoom;
    const la={x:a.x+tx*inset, y:a.y+ty*inset};
    const lb={x:b.x-tx*inset, y:b.y-ty*inset};
    ctx.lineWidth=2/camZoom;
    ctx.beginPath();
    ctx.moveTo(la.x,la.y); ctx.lineTo(la.x-nx*legLen, la.y-ny*legLen);
    ctx.moveTo(lb.x,lb.y); ctx.lineTo(lb.x-nx*legLen, lb.y-ny*legLen);
    ctx.stroke();
  }
  ctx.shadowBlur=0;
}

function drawShip(){
  if(ship.crashed) return;
  ctx.save();
  ctx.translate(ship.px,ship.py);
  ctx.rotate(ship.angle);
  ctx.lineJoin="round"; ctx.lineCap="round";

  // hull (black fill + glowing green outline)
  ctx.beginPath();
  ctx.moveTo(0,-16); ctx.lineTo(10,8); ctx.lineTo(6,12);
  ctx.lineTo(-6,12); ctx.lineTo(-10,8); ctx.closePath();
  ctx.fillStyle="#000600"; ctx.fill();
  ctx.shadowColor="#46ff85"; ctx.shadowBlur=12;
  ctx.strokeStyle="#7dffaa"; ctx.lineWidth=2; ctx.stroke();
  ctx.shadowBlur=0; ctx.strokeStyle="#daffe9"; ctx.lineWidth=0.8; ctx.stroke();

  // legs
  ctx.shadowColor="#46ff85"; ctx.shadowBlur=8;
  ctx.strokeStyle="#7dffaa"; ctx.lineWidth=1.6;
  ctx.beginPath();
  ctx.moveTo(-8,8); ctx.lineTo(-14,18); ctx.lineTo(-18,18);
  ctx.moveTo(8,8);  ctx.lineTo(14,18);  ctx.lineTo(18,18);
  ctx.stroke();

  // cockpit dot
  ctx.fillStyle="#daffe9"; ctx.shadowColor="#cfffe0"; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(0,-2,3.5,0,TWO_PI); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    const l=clamp(p.life,0,1);
    ctx.globalAlpha=l;
    ctx.shadowColor=p.col; ctx.shadowBlur=p.r*l*2.2;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*l,0,TWO_PI); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle="rgba(230,255,240,"+l+")";
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*l/2,0,TWO_PI); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function render(){
  // phosphor persistence: fade toward black instead of a hard clear (beam trails)
  ctx.fillStyle="rgba(0,5,0,0.55)"; ctx.fillRect(0,0,W,H);

  if(gameState===STATE.MENU){ drawStars(); return; }

  drawStars();
  ctx.save();
  worldTransform();
  drawTerrain();
  drawParticles();
  drawShip();
  ctx.restore();
}

// ---------- HUD ----------
function updateHUD(){
  if(gameState!==STATE.PLAYING || !ship) return;
  const d=len(ship.px,ship.py)||1;
  const nx=ship.px/d, ny=ship.py/d;
  const fall=-(ship.vx*nx+ship.vy*ny)/C.pixelsPerMeter;
  const tx=-ny, ty=nx;
  const slide=(ship.vx*tx+ship.vy*ty)/C.pixelsPerMeter;
  const tilt=Math.abs(relTiltDeg(ship.px,ship.py,deg360(ship.angle)));
  const alt=Math.max(0,(len(ship.px,ship.py)-level.radius)/C.pixelsPerMeter);

  const fuelPct=clamp(ship.fuel/level.maxFuel,0,1);
  $("s-fuel").textContent=Math.round(fuelPct*100)+"%";
  $("fuelfill").style.width=(fuelPct*100)+"%";
  $("s-alt").textContent=Math.round(alt)+" m";

  const vyEl=$("s-vy"); vyEl.textContent=fall.toFixed(1)+" m/s";
  vyEl.className="val "+(Math.abs(fall)<=LIMIT.velY?"ok":"bad");
  const vxEl=$("s-vx"); vxEl.textContent=Math.abs(slide).toFixed(1)+" m/s";
  vxEl.className="val "+(Math.abs(slide)<=LIMIT.velX?"ok":"bad");
  const tEl=$("s-tilt"); tEl.textContent=tilt.toFixed(0)+"\u00B0";
  tEl.className="val "+(tilt<=LIMIT.tiltDeg?"ok":"bad");

  let best=null;
  const shipAng=Math.atan2(ship.px,-ship.py);
  for(let i=0;i<level.segments;i++){
    if(!level.isPad[i]) continue;
    const pa=Math.atan2(level.points[i].x,-level.points[i].y);
    let dd=pa-shipAng; while(dd>Math.PI)dd-=TWO_PI; while(dd<=-Math.PI)dd+=TWO_PI;
    if(best===null||Math.abs(dd)<Math.abs(best)) best=dd;
  }
  if(best!==null){
    const arrow = best<-0.05?T("tLeft"):(best>0.05?T("tRight"):T("tBelow"));
    $("target-dist").textContent=arrow+" "+Math.abs(best*180/Math.PI).toFixed(0)+"\u00B0";
  }
}

// ---------- main loop ----------
function loop(now){
  let dt=(now-lastT)/1000; lastT=now;
  if(dt>0.1)dt=0.1;
  const sdt=dt*timeScale;                    // scaled time for simulation + scene
  acc+=sdt;
  let steps=0;
  while(acc>=FIXED && steps<240){ fixedUpdate(FIXED); acc-=FIXED; steps++; }
  if(acc>FIXED*4) acc=0;                      // avoid backlog at high speed / slow device
  updateParticles(sdt);
  if(shake>0) shake=Math.max(0,shake-sdt*30);

  // auto demo: advance to the next level after the result is shown
  if(demoMode && gameState===STATE.OVER){
    demoTimer-=dt; if(demoTimer<=0) startGame(nextDemoSeed());
  }

  render();
  updateHUD();
  requestAnimationFrame(loop);
}
applyI18n();
requestAnimationFrame(loop);
</script>
</body>
